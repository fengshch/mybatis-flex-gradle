plugins {
    // Apply the Java Gradle plugin development plugin to add support for developing Gradle plugins
    id 'java-gradle-plugin'
    id 'maven-publish'
    id 'com.gradle.plugin-publish' version '1.3.0'
    id 'idea'
}

group = GROUP
version = VERSION

java {
    sourceCompatibility = '25'
    withJavadocJar() // Generates javadocJar automatically
    withSourcesJar() // Generates sourcesJar automatically
}


repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    gradlePluginPortal()
}

dependencies {

    implementation(libs.mybatisFlexCodegen)

    implementation(libs.flywaydbGradlePluginPublishing)

    implementation(libs.hikariCP)

    implementation(libs.snakeyaml)

    implementation(libs.freemarker)

    implementation(libs.commonsLang3)

    compileOnly(libs.lombok)

    testCompileOnly(libs.lombok)

    annotationProcessor(libs.lombok)

    testAnnotationProcessor(libs.lombok)

    testImplementation(libs.h2)

    testImplementation(libs.junitJupiter)

    testRuntimeOnly(libs.junitPlatformLauncher)
}

gradlePlugin {
    website = 'https://github.com/fengshch/mybatis-flex-gradle'
    vcsUrl = 'https://github.com/fengshch/mybatis-flex-gradle.git'

    plugins {
        myPlugin {
            id = 'io.github.fengshch.mybatis-flex-gradle-plugin'
            implementationClass = 'io.github.fengshch.mybatis.MyBatisFlexGradlePlugin'
            displayName = 'MyBatis Flex Gradle Plugin'
            description = 'A Gradle plugin for MyBatis Flex code generation with Flyway database migration support. Supports YAML configuration, multiple datasources, and automatic code generation for entities, mappers, services, and controllers.'
            tags.set(['mybatis', 'mybatis-flex', 'code-generation', 'flyway', 'database'])
        }
    }
}

publishing {
    repositories {
        maven {
            name = "maven-release"
            def releasesRepoUrl = uri(findProperty("NexusReleasesRepoUrl") ?: System.getenv("NEXUS_RELEASES_REPO_URL") ?: "")
            def snapshotsRepoUrl = uri(findProperty("NexusSnapshotsRepoUrl") ?: System.getenv("NEXUS_SNAPSHOTS_REPO_URL") ?: "")
            def isSnapshot = project.version?.toString()?.endsWith("SNAPSHOT") ?: false
            url = isSnapshot ? snapshotsRepoUrl : releasesRepoUrl
            allowInsecureProtocol=true

            credentials {
                username = findProperty("NexusUser") ?: System.getenv("NEXUS_USER") ?: ""
                password = findProperty("NexusPassword") ?: System.getenv("NEXUS_PASSWORD") ?: ""
            }
        }
    }
}

tasks.named("test"){
    useJUnitPlatform()
    failOnNoDiscoveredTests=false
}


idea {
    module {
        downloadJavadoc = true
        downloadSources = true
    }
}